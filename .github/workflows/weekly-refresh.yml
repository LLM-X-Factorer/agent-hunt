name: weekly-refresh

# Weekly export + Cloudflare Pages redeploy. Pulls existing data from
# Supabase and regenerates every JSON in frontend/public/data, then
# commits any diff and ships it.
#
# Why no `collect_*` here: cross-region latency (runner US ↔ Supabase
# Sydney) makes per-row collect operations stall past timeouts. Run
# `collect-data` workflow manually when you want fresh ingest, or run
# scripts/collect_*.py locally with the Supabase URL in .env.
on:
  schedule:
    - cron: '0 2 * * 0'  # Sun 02:00 UTC = 10:00 Asia/Shanghai
  workflow_dispatch:

concurrency:
  group: weekly-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      AH_DATABASE_URL_OVERRIDE: ${{ secrets.AH_DATABASE_URL }}
      AH_OPENROUTER_API_KEY: ${{ secrets.AH_OPENROUTER_API_KEY }}
      AH_LLM_MODEL: deepseek/deepseek-v3.2-exp

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies
        working-directory: backend
        run: |
          uv venv --python 3.11 .venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      # ---------------------------------------------------------------
      # Catch-up backfills before exports. These are rule-based,
      # idempotent UPDATEs (no new rows, no LLM calls) so they're safe
      # to run weekly even though most of the workflow is read-only.
      # ---------------------------------------------------------------
      - name: Backfill work_mode from location
        working-directory: backend
        run: .venv/bin/python scripts/backfill_work_mode_from_location.py --apply
        timeout-minutes: 10

      # ---------------------------------------------------------------
      # Regenerate every dependent JSON. Exports are read-only on the
      # DB (in-memory aggregation) so they're fast even across
      # ap-southeast-2 latency.
      # ---------------------------------------------------------------
      - name: Refresh API snapshots
        working-directory: backend
        run: .venv/bin/python scripts/export_api_snapshots.py
        timeout-minutes: 5

      - name: Run all data exports
        working-directory: backend
        timeout-minutes: 15
        run: |
          for s in export_market_data analyze_roles export_real_salary \
                  export_roles_by_industry export_roles_by_city \
                  export_augmented_by_profession export_industry_salary \
                  export_graduate_friendly export_quality_signals \
                  export_applicant_profiles export_vendor_title_breakdown \
                  export_narrative_stats export_narrative_examples \
                  export_trends; do
              echo "=== $s ==="
              .venv/bin/python "scripts/$s.py" || echo "[warn] $s failed"
          done

      - name: Commit data diffs
        run: |
          if [[ -n "$(git status --porcelain frontend/public/data/)" ]]; then
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add frontend/public/data/
              git commit -m "data: weekly refresh ($(date -u +%Y-%m-%d))"
              git push
          else
              echo "no data changes"
          fi

      # ---------------------------------------------------------------
      # Frontend rebuild + Cloudflare Pages deploy
      # ---------------------------------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/out --project-name agent-hunt --commit-dirty=true
