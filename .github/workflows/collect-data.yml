name: collect-data

# Manual ad-hoc data collection. Runs the no-anti-scrape sources
# (HN Who is Hiring, GitHub hiring repos) and the Tencent vendor
# collector. Triggered by the user when they want fresh ingest.
#
# Not on a cron schedule — cross-region DB latency (runner ↔ Supabase
# Sydney) makes these per-row INSERT loops slow / unstable. Prefer
# running the collectors locally with the Supabase URL in .env when
# the volume is large.
on:
  workflow_dispatch:
    inputs:
      collector:
        description: 'Which collector to run'
        required: true
        default: 'hn'
        type: choice
        options:
          - hn
          - github
          - tencent
          - all

concurrency:
  group: collect-data
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      AH_DATABASE_URL_OVERRIDE: ${{ secrets.AH_DATABASE_URL }}
      AH_OPENROUTER_API_KEY: ${{ secrets.AH_OPENROUTER_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies
        working-directory: backend
        run: |
          uv venv --python 3.11 .venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Collect HN Who is Hiring
        if: ${{ inputs.collector == 'hn' || inputs.collector == 'all' }}
        working-directory: backend
        run: .venv/bin/python scripts/collect_hn_wih.py
        timeout-minutes: 20

      - name: Collect GitHub hiring repos
        if: ${{ inputs.collector == 'github' || inputs.collector == 'all' }}
        working-directory: backend
        run: .venv/bin/python scripts/collect_github_hiring.py
        timeout-minutes: 30

      - name: Collect Tencent
        if: ${{ inputs.collector == 'tencent' || inputs.collector == 'all' }}
        working-directory: backend
        run: .venv/bin/python scripts/collect_vendor_tencent.py
        timeout-minutes: 15

      - name: Backfill role_type
        if: ${{ inputs.collector == 'all' || inputs.collector == 'github' || inputs.collector == 'tencent' }}
        working-directory: backend
        run: .venv/bin/python scripts/backfill_role_type_rules.py --apply
        timeout-minutes: 10

      - name: Backfill work_mode from location
        working-directory: backend
        run: .venv/bin/python scripts/backfill_work_mode_from_location.py --apply
        timeout-minutes: 10
